<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fake News Intelligence</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Fake News Intelligence</h1>
    </header>

    <main>
        <section class="input-section">
            <textarea id="newsInput" placeholder="Paste a news article or claim here..."></textarea>
            <button id="analyzeBtn">Analyze</button>
        </section>

        <div id="overlay" class="overlay hidden">
            <div class="loading">
                <div class="spinner"></div>
                <span>Analyzing...</span>
            </div>
        </div>

        <section id="result" class="results"></section>
    </main>
</div>

<script>
const analyzeBtn = document.getElementById("analyzeBtn");

analyzeBtn.addEventListener('click', analyzeText);

async function analyzeText() {
    const text = document.getElementById("newsInput").value;
    const overlay = document.getElementById("overlay");
    const resultDiv = document.getElementById("result");

    if (!text.trim()) {
        alert("Please enter some text to analyze.");
        return;
    }

    analyzeBtn.disabled = true;
    overlay.classList.remove("hidden");
    resultDiv.innerHTML = "";

    try {
        const response = await fetch("/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        overlay.classList.add("hidden");
        analyzeBtn.disabled = false;

        if (data.error) {
            resultDiv.innerHTML = `<p class="error">${data.error}</p>`;
            return;
        }

        resultDiv.innerHTML = `
            <div class="card prediction-card">
                <h2>Prediction</h2>
                <p class="label">${data.prediction.label}</p>
                <p class="confidence">Confidence: ${data.prediction.confidence}%</p>
            </div>

            <div class="card claims-card">
                <h3>Extracted Claims</h3>
                <ul>
                    ${data.claims.length ? data.claims.map(c => `<li>${c}</li>`).join("") : '<li><em>No claims found.</em></li>'}
                </ul>
            </div>

            <div class="card factcard">
                <h3>Fact Check Results</h3>
                <ul>
                    ${data.fact_checks.length ? data.fact_checks.map(f => `
                        <li>
                            <strong>${f.claim}</strong><br>
                            Verdict: ${f.verdict}<br>
                            Publisher: ${f.publisher || "N/A"}<br>
                            ${f.url ? `<a href="${f.url}" target="_blank">Read Source</a>` : ""}
                        </li>
                    `).join("") : '<li><em>No fact check results.</em></li>'}
                </ul>
            </div>
        `;
    } catch (err) {
        overlay.classList.add("hidden");
        analyzeBtn.disabled = false;
        resultDiv.innerHTML = `<p class="error">Network error: ${err.message}</p>`;
    }
}
</script>

</body>
</html>
